name: ysl_store_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Utility Packages
  http: ^1.6.0
  intl: ^0.20.2
  logger: ^2.6.2
  lottie: ^3.3.2
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^2.0.1

  #icon
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.7.3
  get_storage: ^2.1.1

  # Product Specific
  readmore: ^3.0.0
  carousel_slider: ^5.1.1
  flutter_rating_bar: ^4.0.1

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:


  uses-material-design: true

  #-------------- Local  Assets  ----------------
  assets:
    - assets/icons/
    - assets/logos/
    - assets/images/
    - assets/images/user/
    - assets/images/banners/
    - assets/images/reviews/
    - assets/images/products/
    - assets/icons/categories/
    - assets/images/verify_email/
    - assets/icons/payment_methods/
    - assets/images/products/phones/
    - assets/images/on_boarding_images/
    - assets/images/products/earphones/
    - assets/images/products/headphones/
    - assets/images/products/power_banks/
    - assets/images/products/cooling_fan/
    - assets/images/products/smartwatches/

  #-------------- Local Fonts  ----------------
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500


