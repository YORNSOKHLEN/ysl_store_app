name: ysl_store_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Utility Packages
  http: ^1.6.0
  intl: ^0.20.2
  logger: ^2.6.2
  lottie: ^3.3.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  flutter_native_splash: ^2.4.7
  smooth_page_indicator: ^2.0.1

  #icon
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.7.3
  get_storage: ^2.1.1

  # Product Specific
  readmore: ^3.0.0
  carousel_slider: ^5.1.1
  flutter_rating_bar: ^4.0.1

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  google_sign_in: ^6.1.6
  image_picker: ^1.2.1
  firebase_storage: ^13.0.5
  cached_network_image: ^3.4.1
  firebase_app_check: ^0.4.1+3

  # Google Map
  google_maps_flutter: ^2.3.0
  geolocator: ^9.0.2
  geocoding: ^2.0.5



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:


  uses-material-design: true

  #-------------- Local  Assets  ----------------
  assets:
    - assets/icons/
    - assets/logos/
    - assets/images/
    - assets/images/user/
    - assets/images/banners/
    - assets/images/reviews/
    - assets/images/products/
    - assets/icons/categories/
    - assets/images/verify_email/
    - assets/images/products/pizza/
    - assets/images/products/burger/
    - assets/icons/payment_methods/
    - assets/images/on_boarding_images/


  #-------------- Local Fonts  ----------------
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Medium.ttf


